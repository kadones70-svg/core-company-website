<?xml version="1.0" encoding="UTF-8"?>
<!--
  Core Company — 데이터 주권 흐름도 (promise 섹션용)
  의미: 공장 ↔ 온프레미스 sLLM 서버 = 사내(파란 실선, 양방향)
        서버 → 외부 클라우드 = 차단(X)
  색/폰트는 :root 변수로 분리 (brand_guidelines_v8 값으로 교체)
  ※ 색상은 style="" 인라인으로 적용 (presentation 속성의 var()는 브라우저 호환성 낮음)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440"
     width="100%" role="img" aria-labelledby="diagTitle diagDesc">
  <title id="diagTitle">데이터는 사업장 안에서만 흐릅니다</title>
  <desc id="diagDesc">공장과 온프레미스 sLLM 서버는 사내망에서 양방향으로 연결되고, 서버에서 외부 클라우드로 나가는 경로는 차단됩니다.</desc>

  <style>
    /* === brand_guidelines_v8 값으로 교체 (현재 임시 기본값) === */
    svg{
      --brand-blue:#1E56C8;  /* Core Blue (brand_guidelines_v8) */
      --ink:#1A1A1A;
      --muted:#9AA1AC;
      --blocked:#D92D20;
      --surface:#FFFFFF;
      --zone:#F3F6FF;
      --font-body:'Noto Sans KR', sans-serif; /* Noto Sans KR (brand_guidelines_v8) */
      --font-mono:'DM Mono', ui-monospace, monospace;
    }
    text{ font-family:var(--font-body); }
    .label   { fill:var(--ink); font-size:15px; font-weight:600; }
    .sub     { fill:var(--ink); font-size:12px; font-weight:400; opacity:.7; }
    .flowtag { fill:var(--brand-blue); font-size:12px; font-weight:600; letter-spacing:.02em; }
    .blocktag{ fill:var(--blocked); font-size:12px; font-weight:600; }
    .mutedlbl{ fill:var(--muted); font-size:14px; font-weight:600; }
    .badge   { fill:var(--brand-blue); font-family:var(--font-mono);
               font-size:13px; font-weight:500; letter-spacing:.22em; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" style="fill:var(--brand-blue)"/>
    </marker>
  </defs>

  <!-- ===== 온프레미스 존 ===== -->
  <rect x="48" y="96" width="540" height="288" rx="18"
        style="fill:var(--zone); stroke:var(--brand-blue)" stroke-width="1.5" stroke-dasharray="2 6"/>

  <!-- ON-PREMISE ONLY 배지 -->
  <rect x="196" y="80" width="244" height="32" rx="16"
        style="fill:var(--surface); stroke:var(--brand-blue)" stroke-width="1.5"/>
  <text x="318" y="101" text-anchor="middle" class="badge">ON-PREMISE ONLY</text>

  <!-- ===== 공장 노드 ===== -->
  <rect x="92" y="172" width="150" height="132" rx="12"
        style="fill:var(--surface); stroke:var(--ink)" stroke-width="2"/>
  <g style="stroke:var(--ink)" stroke-width="2" fill="none" stroke-linejoin="round">
    <path d="M120,232 V204 l16,12 V204 l16,12 V204 l16,12 V204 l16,12"/>
    <rect x="200" y="190" width="10" height="26" style="fill:var(--ink)"/>
    <rect x="120" y="232" width="94" height="34" style="fill:var(--surface)"/>
  </g>
  <text x="167" y="290" text-anchor="middle" class="label">공장</text>

  <!-- ===== sLLM 서버 노드 ===== -->
  <rect x="388" y="172" width="160" height="132" rx="12"
        style="fill:var(--surface); stroke:var(--ink)" stroke-width="2"/>
  <g style="stroke:var(--ink)" stroke-width="2" fill="none">
    <rect x="430" y="190" width="76" height="18" rx="3"/>
    <rect x="430" y="212" width="76" height="18" rx="3"/>
  </g>
  <circle cx="442" cy="199" r="2.5" style="fill:var(--brand-blue)"/>
  <circle cx="442" cy="221" r="2.5" style="fill:var(--brand-blue)"/>
  <text x="468" y="262" text-anchor="middle" class="label">sLLM 서버</text>
  <text x="468" y="282" text-anchor="middle" class="sub">온프레미스</text>

  <!-- ===== 공장 ↔ 서버: 파란 실선(양방향) ===== -->
  <line x1="246" y1="220" x2="384" y2="220"
        style="stroke:var(--brand-blue)" stroke-width="3"
        marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="315" y="206" text-anchor="middle" class="flowtag">사내 데이터</text>

  <!-- ===== 외부 클라우드(존 밖) ===== -->
  <path d="M724,196 a26,26 0 0 1 50,-8 a20,20 0 0 1 26,20 a18,18 0 0 1 -8,34 H730 a24,24 0 0 1 -6,-46 z"
        fill="none" style="stroke:var(--muted)" stroke-width="2" opacity="0.85"/>
  <text x="772" y="280" text-anchor="middle" class="mutedlbl">외부 클라우드</text>

  <!-- ===== 서버 → 클라우드: 차단(X) ===== -->
  <line x1="552" y1="220" x2="700" y2="220"
        style="stroke:var(--muted)" stroke-width="2.5" stroke-dasharray="6 6"/>
  <circle cx="626" cy="220" r="20" style="fill:var(--surface); stroke:var(--blocked)" stroke-width="3"/>
  <line x1="612" y1="234" x2="640" y2="206" style="stroke:var(--blocked)" stroke-width="3" stroke-linecap="round"/>
  <text x="626" y="268" text-anchor="middle" class="blocktag">외부 전송 차단</text>
</svg>